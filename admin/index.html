<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="icon" href="assets/images/Vector.svg" type="image/svg+xml">
  <link rel="icon" href="assets/images/Vector.png" type="image/png">
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="admin-login-page">
    <div class="admin-login-box">
      <div class="admin-login-logo">
        <img src="assets/images/Vector.svg" alt="Logo" style="height:32px;" />
        Admin
      </div>
      <form class="admin-login-form" onsubmit="handleAdminLogin(event)">
        <div class="admin-form-group">
          <label class="admin-form-label">Email</label>
          <input type="email" class="admin-form-input" id="admin-email" placeholder="admin@admin.com" required />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Password</label>
          <input type="password" class="admin-form-input" id="admin-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="admin-login-btn">Login</button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:12.5px;color:#9ca3af;">
        Use: admin@admin.com / admin123
      </p>
    </div>
  </div>

  <script src="js/admin-auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isAdminLoggedIn()) window.location.href = "dashboard.html";

    function handleAdminLogin(e) {
      e.preventDefault();
      const email = document.getElementById("admin-email").value.trim();
      const password = document.getElementById("admin-password").value;
      if (adminLogin(email, password)) {
        window.location.href = "dashboard.html";
      } else {
        adminToast("Invalid email or password.", "error");
      }
    }
  </script>
</body>
</html>
