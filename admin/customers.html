<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers</title>
  <link rel="stylesheet" href="css/admin.css" />
  <style>
    .detail-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .detail-modal-overlay.open { opacity: 1; pointer-events: all; }
    .detail-modal {
      background: white; border-radius: 12px;
      width: 100%; max-width: 580px; max-height: 85vh;
      overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.16);
      transform: translateY(-12px); transition: transform 0.25s ease;
    }
    .detail-modal-overlay.open .detail-modal { transform: translateY(0); }
    .detail-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--admin-gray-100);
      position: sticky; top: 0; background: white; z-index: 1;
      border-radius: 12px 12px 0 0;
    }
    .detail-modal-head h3 { font-size: 16px; font-weight: 700; }
    .detail-modal-close {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; color: var(--admin-gray-400); font-size: 18px; cursor: pointer;
      transition: all 0.18s;
    }
    .detail-modal-close:hover { background: var(--admin-gray-100); color: var(--admin-black); }
    .detail-modal-body { padding: 24px; }
    .customer-info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
      padding: 20px; background: var(--admin-gray-50); border-radius: 8px;
    }
    .info-field label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--admin-gray-400); display: block; margin-bottom: 4px;
    }
    .info-field span { font-size: 13.5px; font-weight: 500; color: var(--admin-black); }
    .section-divider {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--admin-gray-400);
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid var(--admin-gray-100);
      display: flex; align-items: center; gap: 8px;
    }
    .order-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 0; border-bottom: 1px solid var(--admin-gray-50);
    }
    .order-row:last-child { border-bottom: none; }
    .order-row img {
      width: 44px; height: 44px; border-radius: 6px;
      object-fit: cover; background: var(--admin-gray-100); flex-shrink: 0;
    }
    .order-row-info { flex: 1; min-width: 0; }
    .order-row-name { font-size: 13.5px; font-weight: 500; margin-bottom: 3px; }
    .order-row-sub { font-size: 12px; color: var(--admin-gray-400); }
    .empty-orders {
      text-align: center; padding: 32px; color: var(--admin-gray-400);
    }
    .empty-orders svg { width: 40px; height: 40px; margin: 0 auto 12px; opacity: 0.4; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-placeholder"></div>
    <div class="admin-main">
      <div id="topbar-placeholder"></div>
      <div class="admin-content">
        <div class="admin-table-wrap">
          <div class="admin-table-header">
            <h2>Customers</h2>
            <div class="admin-search">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
              </svg>
              <input type="text" id="cust-search" placeholder="Search customers"
                oninput="searchCustomers(this.value)" />
            </div>
          </div>
          <table class="admin-table">
            <thead>
              <tr>
                <th><button class="admin-sort-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg></button></th>
                <th>Name</th>
                <th>Email</th>
                <th>Shipping Address</th>
                <th>Orders</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="customers-tbody"></tbody>
          </table>
          <div class="admin-pagination" id="customers-pagination"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Customer Modal -->
  <div class="detail-modal-overlay" id="customer-modal" onclick="handleModalBg(event)">
    <div class="detail-modal">
      <div class="detail-modal-head">
        <h3 id="modal-title">Customer Details</h3>
        <button class="detail-modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="detail-modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/admin-auth.js"></script>
  <script src="js/admin-global.js"></script>
  <script>
    const CUST_PAGE = 8;
    let allCustomers = [], filteredCustomers = [], custPage = 1;

    function getInitials(name) {
      return (name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
    }

    function formatAddress(addr) {
      if (!addr) return "—";
      return [addr.street, addr.city, addr.state, addr.zip].filter(Boolean).join(", ");
    }

    function loadCustomers() {
      allCustomers = JSON.parse(localStorage.getItem("ec_users") || "[]");
      filteredCustomers = [...allCustomers];
    }

    function getCustomerOrders(customer) {
      const orders = JSON.parse(localStorage.getItem("ec_orders") || "[]");
      return orders.filter(o =>
        o.email === customer.email ||
        o.name === customer.name
      );
    }

    function searchCustomers(q) {
      const query = q.toLowerCase();
      filteredCustomers = query
        ? allCustomers.filter(c =>
            c.name.toLowerCase().includes(query) ||
            c.email.toLowerCase().includes(query))
        : [...allCustomers];
      custPage = 1;
      renderCustomers();
    }

    function renderCustomers() {
      const tbody = document.getElementById("customers-tbody");
      const start = (custPage - 1) * CUST_PAGE;
      const paged = filteredCustomers.slice(start, start + CUST_PAGE);

      if (paged.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="admin-no-results">No customers found.</td></tr>`;
        return;
      }

      tbody.innerHTML = paged.map(c => {
        const orderCount = getCustomerOrders(c).length;
        return `
          <tr>
            <td><div class="admin-avatar">${getInitials(c.name)}</div></td>
            <td style="font-weight:500;">${c.name}</td>
            <td style="color:var(--admin-gray-500);">${c.email}</td>
            <td style="color:var(--admin-gray-500);font-size:13px;">${formatAddress(c.address)}</td>
            <td>
              <span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
                background:var(--admin-blue-light);color:var(--admin-blue);
                border-radius:20px;font-size:12px;font-weight:700;">
                ${orderCount} order${orderCount !== 1 ? "s" : ""}
              </span>
            </td>
            <td>
              <button onclick="openCustomerModal('${c.email}')"
                style="display:inline-flex;align-items:center;gap:5px;padding:6px 12px;
                  background:var(--admin-blue-light);color:var(--admin-blue);
                  border-radius:6px;font-size:12.5px;font-weight:600;
                  border:none;cursor:pointer;transition:all 0.18s;"
                onmouseover="this.style.background='#dbeafe'"
                onmouseout="this.style.background='var(--admin-blue-light)'">
                <svg fill="none" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                View Orders
              </button>
            </td>
          </tr>`;
      }).join("");

      renderAdminPagination("customers-pagination", filteredCustomers.length, CUST_PAGE, custPage, "custGoToPage");
    }

    function custGoToPage(page) {
      const pages = Math.ceil(filteredCustomers.length / CUST_PAGE);
      if (page < 1 || page > pages) return;
      custPage = page;
      renderCustomers();
    }

    function openCustomerModal(email) {
      const customer = allCustomers.find(c => c.email === email);
      if (!customer) return;
      const orders = getCustomerOrders(customer);

      document.getElementById("modal-title").textContent = `${customer.name}'s Profile`;
      document.getElementById("modal-body").innerHTML = `

        <!-- Customer Info -->
        <div class="section-divider">
          <svg fill="none" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Customer Info
        </div>
        <div class="customer-info-grid">
          <div class="info-field">
            <label>Full Name</label>
            <span>${customer.name}</span>
          </div>
          <div class="info-field">
            <label>Email</label>
            <span>${customer.email}</span>
          </div>
          <div class="info-field">
            <label>Street Address</label>
            <span>${customer.address?.street || "—"}</span>
          </div>
          <div class="info-field">
            <label>City</label>
            <span>${customer.address?.city || "—"}</span>
          </div>
          <div class="info-field">
            <label>State / Zip</label>
            <span>${[customer.address?.state, customer.address?.zip].filter(Boolean).join(" ") || "—"}</span>
          </div>
          <div class="info-field">
            <label>Country</label>
            <span>${customer.address?.country || "—"}</span>
          </div>
        </div>

        <!-- Orders -->
        <div class="section-divider">
          <svg fill="none" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
          </svg>
          Order History
          <span style="font-weight:400;color:var(--admin-gray-400);
            text-transform:none;letter-spacing:0;font-size:12px;">
            (${orders.length} order${orders.length !== 1 ? "s" : ""})
          </span>
        </div>

        ${orders.length === 0 ? `
          <div class="empty-orders">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
              <path stroke-linecap="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4"/>
            </svg>
            <p>No orders found for this customer.</p>
          </div>` :
          orders.map(o => `
            <div class="order-row">
              <img src="${o.items[0]?.image || "https://placehold.co/44x44/f3f3f3/aaa?text=?"}"
                onerror="this.src='https://placehold.co/44x44/f3f3f3/aaa?text=?'" />
              <div class="order-row-info">
                <div class="order-row-name">${o.items[0]?.name || "Order"}</div>
                <div class="order-row-sub">${o.id} · ${o.date}</div>
              </div>
              <div style="text-align:right;flex-shrink:0;">
                <div style="font-size:14px;font-weight:700;margin-bottom:4px;">
                  ${(o.total || 0).toFixed(2)} DA
                </div>
                <span class="status-badge ${(o.status || "").toLowerCase()}">
                  ${o.status}
                </span>
              </div>
            </div>`).join("")
        }
      `;

      document.getElementById("customer-modal").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      document.getElementById("customer-modal").classList.remove("open");
      document.body.style.overflow = "";
    }

    function handleModalBg(e) {
      if (e.target === e.currentTarget) closeModal();
    }

    document.addEventListener("DOMContentLoaded", () => {
      requireAdminAuth();
      seedAdminData();
      document.getElementById("sidebar-placeholder").innerHTML = renderAdminSidebar("customers");
      document.getElementById("topbar-placeholder").innerHTML = renderAdminTopbar("Customers");
      loadCustomers();
      renderCustomers();
    });
  </script>
</body>
</html>
