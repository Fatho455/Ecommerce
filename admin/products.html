<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products</title>
  <link rel="stylesheet" href="css/admin.css" />
  <style>
    /* ── Product Modal ── */
    .product-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .product-modal-overlay.open { opacity: 1; pointer-events: all; }
    .product-modal {
      background: white; border-radius: 12px;
      width: 100%; max-width: 720px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.16);
      transform: translateY(-14px);
      transition: transform 0.25s ease;
    }
    .product-modal-overlay.open .product-modal { transform: translateY(0); }
    .product-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 28px; border-bottom: 1px solid var(--admin-gray-100);
      position: sticky; top: 0; background: white; z-index: 1;
      border-radius: 12px 12px 0 0;
    }
    .product-modal-head h3 { font-size: 17px; font-weight: 700; }
    .product-modal-close {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; color: var(--admin-gray-400); font-size: 20px; cursor: pointer;
      transition: all 0.18s;
    }
    .product-modal-close:hover { background: var(--admin-gray-100); color: var(--admin-black); }
    .product-modal-body { padding: 28px; }
    .product-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 32px; }
    .product-modal-footer {
      display: flex; gap: 12px; justify-content: flex-end;
      padding: 20px 28px; border-top: 1px solid var(--admin-gray-100);
      position: sticky; bottom: 0; background: white;
    }
    .pm-cancel-btn {
      padding: 10px 22px; border: 1.5px solid var(--admin-gray-200);
      border-radius: 6px; font-size: 14px; font-weight: 500;
      color: var(--admin-gray-600); cursor: pointer; transition: all 0.18s;
      background: white;
    }
    .pm-cancel-btn:hover { border-color: var(--admin-black); color: var(--admin-black); }
    .pm-save-btn {
      padding: 10px 28px; background: var(--admin-black); color: white;
      border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.18s; border: none;
    }
    .pm-save-btn:hover { background: #1a2332; }
    .pm-size-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .pm-size-btn {
      min-width: 38px; height: 34px; padding: 0 10px;
      border: 1.5px solid var(--admin-gray-200); border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      background: white; transition: all 0.18s;
    }
    .pm-size-btn.active { background: var(--admin-black); color: white; border-color: var(--admin-black); }
    .pm-color-wrap { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
    .pm-color-dot {
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.18s;
    }
    .pm-color-dot.active {
      border-color: var(--admin-black);
      outline: 2px solid var(--admin-gray-300); outline-offset: 2px;
    }
    .stock-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
    .stock-indicator.in { color: var(--admin-success); }
    .stock-indicator.out { color: var(--admin-error); }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-placeholder"></div>
    <div class="admin-main">
      <div id="topbar-placeholder"></div>
      <div class="admin-content">
        <div class="admin-table-wrap">
          <div class="admin-table-header">
            <h2>Products</h2>
            <div style="display:flex;gap:12px;align-items:center;">
              <button class="admin-add-btn" onclick="openProductModal()">
                <svg fill="none" viewBox="0 0 24 24" width="15" height="15"
                  stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" d="M12 4v16m8-8H4"/>
                </svg>
                Add product
              </button>
              <div class="admin-search">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/>
                  <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="product-search" placeholder="Search products"
                  oninput="searchProducts(this.value)" />
              </div>
            </div>
          </div>
          <table class="admin-table">
            <thead>
              <tr>
                <th><button class="admin-sort-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg></button></th>
                <th>Name</th>
                <th>SKU</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Categories</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="products-tbody"></tbody>
          </table>
          <div class="admin-pagination" id="products-pagination"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Add/Edit Product Modal ── -->
  <div class="product-modal-overlay" id="product-modal" onclick="handleModalBg(event)">
    <div class="product-modal">
      <div class="product-modal-head">
        <h3 id="modal-title">Add Product</h3>
        <button class="product-modal-close" onclick="closeProductModal()">✕</button>
      </div>
      <div class="product-modal-body">
        <div class="product-modal-grid">
          <!-- Left -->
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="admin-form-group">
              <label class="admin-form-label">Title *</label>
              <input type="text" class="admin-form-input" id="pm-title" placeholder="Product name" />
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Price (DA) *</label>
              <input type="number" class="admin-form-input" id="pm-price"
                placeholder="0.00" min="0" step="0.01" />
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Category</label>
              <select class="admin-form-input" id="pm-category">
                <option value="tshirts">T-Shirts</option>
                <option value="hoodies">Hoodies</option>
                <option value="sweatshirts">Sweatshirts</option>
                <option value="accessories">Accessories</option>
              </select>
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">SKU</label>
              <input type="text" class="admin-form-input" id="pm-sku" placeholder="47514501" />
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Description</label>
              <textarea class="admin-form-input" id="pm-description" rows="4"
                placeholder="Product description…" style="resize:vertical;"></textarea>
            </div>
          </div>
          <!-- Right -->
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="admin-form-group">
              <label class="admin-form-label">Stock Status</label>
              <select class="admin-form-input" id="pm-stock">
                <option value="In Stock">In Stock</option>
                <option value="Out of Stock">Out of Stock</option>
                <option value="Low Stock">Low Stock</option>
              </select>
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Image URL</label>
              <input type="text" class="admin-form-input" id="pm-image"
                placeholder="https://... or leave blank"
                oninput="previewImage(this.value)" />
              <div id="pm-img-preview" style="margin-top:8px;display:none;">
                <img id="pm-img-thumb" style="width:80px;height:80px;object-fit:cover;
                  border-radius:8px;border:1px solid var(--admin-gray-200);" />
              </div>
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Badge</label>
              <select class="admin-form-input" id="pm-badge">
                <option value="">None</option>
                <option value="New">New</option>
                <option value="Best Seller">Best Seller</option>
                <option value="Featured">Featured</option>
                <option value="Sale">Sale</option>
              </select>
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Sizes</label>
              <div class="pm-size-wrap" id="pm-sizes">
                <button type="button" class="pm-size-btn" data-size="XS" onclick="togglePmSize(this)">XS</button>
                <button type="button" class="pm-size-btn active" data-size="S" onclick="togglePmSize(this)">S</button>
                <button type="button" class="pm-size-btn active" data-size="M" onclick="togglePmSize(this)">M</button>
                <button type="button" class="pm-size-btn active" data-size="L" onclick="togglePmSize(this)">L</button>
                <button type="button" class="pm-size-btn active" data-size="XL" onclick="togglePmSize(this)">XL</button>
                <button type="button" class="pm-size-btn" data-size="XXL" onclick="togglePmSize(this)">XXL</button>
              </div>
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Colors</label>
              <div class="pm-color-wrap" id="pm-colors">
                <div class="pm-color-dot active" style="background:#0a0a0a;"
                  data-color="#0a0a0a" data-name="Black" onclick="togglePmColor(this)" title="Black"></div>
                <div class="pm-color-dot" style="background:#ffffff;border:1.5px solid #d1d5db;"
                  data-color="#ffffff" data-name="White" onclick="togglePmColor(this)" title="White"></div>
                <div class="pm-color-dot" style="background:#374151;"
                  data-color="#374151" data-name="Gray" onclick="togglePmColor(this)" title="Gray"></div>
                <div class="pm-color-dot" style="background:#78350f;"
                  data-color="#78350f" data-name="Brown" onclick="togglePmColor(this)" title="Brown"></div>
                <div class="pm-color-dot" style="background:#1d4ed8;"
                  data-color="#1d4ed8" data-name="Blue" onclick="togglePmColor(this)" title="Blue"></div>
                <div class="pm-color-dot" style="background:#dc2626;"
                  data-color="#dc2626" data-name="Red" onclick="togglePmColor(this)" title="Red"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="product-modal-footer">
        <button class="pm-cancel-btn" onclick="closeProductModal()">Cancel</button>
        <button class="pm-save-btn" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="admin-modal-overlay" id="delete-modal">
    <div class="admin-modal">
      <h3>Delete Product</h3>
      <p>Are you sure you want to delete this product? It will also be removed from the website.</p>
      <div class="admin-modal-actions">
        <button class="admin-modal-cancel" onclick="closeDeleteModal()">Cancel</button>
        <button class="admin-modal-confirm" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/admin-auth.js"></script>
  <script src="js/admin-global.js"></script>
  <script src="js/products.js"></script>
  <script>
    let editingId = null;

    function openProductModal(productId = null) {
      editingId = productId;
      document.getElementById("modal-title").textContent = productId ? "Edit Product" : "Add Product";

      // Reset form
      document.getElementById("pm-title").value = "";
      document.getElementById("pm-price").value = "";
      document.getElementById("pm-category").value = "tshirts";
      document.getElementById("pm-sku").value = "";
      document.getElementById("pm-description").value = "";
      document.getElementById("pm-stock").value = "In Stock";
      document.getElementById("pm-image").value = "";
      document.getElementById("pm-badge").value = "";
      document.getElementById("pm-img-preview").style.display = "none";
      document.querySelectorAll(".pm-size-btn").forEach(b =>
        b.classList.toggle("active", ["S","M","L","XL"].includes(b.dataset.size)));
      document.querySelectorAll(".pm-color-dot").forEach(b =>
        b.classList.toggle("active", b.dataset.color === "#0a0a0a"));

      // Fill if editing
      if (productId) {
        const products = JSON.parse(localStorage.getItem("ec_admin_products") || "[]");
        const p = products.find(x => x.id === productId);
        if (p) {
          document.getElementById("pm-title").value = p.name || "";
          document.getElementById("pm-price").value = p.price || "";
          document.getElementById("pm-category").value = p.category || "tshirts";
          document.getElementById("pm-sku").value = p.sku || "";
          document.getElementById("pm-description").value = p.description || "";
          document.getElementById("pm-stock").value = p.stock || "In Stock";
          document.getElementById("pm-badge").value = p.badge || "";
          if (p.image) {
            document.getElementById("pm-image").value = p.image;
            previewImage(p.image);
          }
          if (p.sizes) {
            document.querySelectorAll(".pm-size-btn").forEach(b =>
              b.classList.toggle("active", p.sizes.includes(b.dataset.size)));
          }
          if (p.colors) {
            document.querySelectorAll(".pm-color-dot").forEach(b =>
              b.classList.toggle("active", p.colors.includes(b.dataset.color)));
          }
        }
      }

      document.getElementById("product-modal").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeProductModal() {
      document.getElementById("product-modal").classList.remove("open");
      document.body.style.overflow = "";
      editingId = null;
    }

    function handleModalBg(e) {
      if (e.target === e.currentTarget) closeProductModal();
    }

    function previewImage(url) {
      const wrap = document.getElementById("pm-img-preview");
      const thumb = document.getElementById("pm-img-thumb");
      if (url && url.trim()) {
        thumb.src = url;
        wrap.style.display = "block";
      } else {
        wrap.style.display = "none";
      }
    }

    function togglePmSize(btn) { btn.classList.toggle("active"); }
    function togglePmColor(dot) { dot.classList.toggle("active"); }

    function saveProduct() {
      const name = document.getElementById("pm-title").value.trim();
      const price = parseFloat(document.getElementById("pm-price").value);
      if (!name || isNaN(price) || price <= 0) {
        adminToast("Please fill in Title and Price.", "error");
        return;
      }

      const category = document.getElementById("pm-category").value;
      const sku = document.getElementById("pm-sku").value.trim() || "47514501";
      const description = document.getElementById("pm-description").value.trim();
      const stock = document.getElementById("pm-stock").value;
      const imageUrl = document.getElementById("pm-image").value.trim();
      const badge = document.getElementById("pm-badge").value || null;

      const selectedSizes = [...document.querySelectorAll(".pm-size-btn.active")]
        .map(b => b.dataset.size);
      const selectedColors = [...document.querySelectorAll(".pm-color-dot.active")]
        .map(d => d.dataset.color);
      const selectedColorNames = [...document.querySelectorAll(".pm-color-dot.active")]
        .map(d => d.dataset.name);

      const image = imageUrl ||
        `https://placehold.co/400x400/1a1a1a/fff?text=${encodeURIComponent(name)}`;

      const productData = {
        id: editingId || (name.toLowerCase().replace(/\s+/g, "-") + "-" + Date.now()),
        name, price, category, sku, description, stock, image,
        images: [image], badge,
        colors: selectedColors,
        colorNames: selectedColorNames,
        sizes: selectedSizes,
        rating: 4.0, reviews: 0, inStock: stock !== "Out of Stock",
        features: []
      };

      const products = JSON.parse(localStorage.getItem("ec_admin_products") || "[]");
      if (editingId) {
        const idx = products.findIndex(p => p.id === editingId);
        if (idx !== -1) products[idx] = productData;
      } else {
        products.unshift(productData);
      }

      localStorage.setItem("ec_admin_products", JSON.stringify(products));
      closeProductModal();
      allProducts = products;
      filteredProducts = [...products];
      renderTable();
      adminToast(editingId ? "Product updated!" : "Product added!", "success");
    }

    // Override edit in products.js action menu
    function editProduct(id) {
      document.querySelectorAll(".action-menu").forEach(m => m.style.display = "none");
      openProductModal(id);
    }
  </script>
</body>
</html>
