<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-placeholder"></div>
    <div class="admin-main">
      <div id="topbar-placeholder"></div>
      <div class="admin-content">
        <div class="admin-table-wrap">
          <div class="admin-table-header">
            <h2>Products</h2>
            <div style="display:flex;gap:12px;align-items:center;">
              <a href="add-product.html" class="admin-add-btn">
                <svg fill="none" viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M12 4v16m8-8H4"/></svg>
                Add product
              </a>
              <div class="admin-search">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="product-search" placeholder="Search products" oninput="searchProducts(this.value)" />
              </div>
            </div>
          </div>
          <table class="admin-table">
            <thead>
              <tr>
                <th><button class="admin-sort-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg></button></th>
                <th>Name</th>
                <th>SKU</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Categories</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="products-tbody"></tbody>
          </table>
          <div class="admin-pagination" id="products-pagination"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="admin-modal-overlay" id="delete-modal">
    <div class="admin-modal">
      <h3>Delete Product</h3>
      <p>Are you sure you want to delete this product? This action cannot be undone.</p>
      <div class="admin-modal-actions">
        <button class="admin-modal-cancel" onclick="closeDeleteModal()">Cancel</button>
        <button class="admin-modal-confirm" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/admin-auth.js"></script>
  <script src="js/admin-global.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
