<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews</title>
  <link rel="icon" href="assets/images/Vector.svg" type="image/svg+xml">
  <link rel="icon" href="assets/images/Vector.png" type="image/png">
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-placeholder"></div>
    <div class="admin-main">
      <div id="topbar-placeholder"></div>
      <div class="admin-content">
        <div class="admin-table-wrap">
          <div class="admin-table-header">
            <h2>Reviews</h2>
            <div class="admin-search">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
              <input type="text" id="rev-search" placeholder="Search reviews" oninput="searchReviews(this.value)" />
            </div>
          </div>
          <table class="admin-table">
            <thead>
              <tr>
                <th><button class="admin-sort-btn"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg></button></th>
                <th>Name</th>
                <th>Review</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="reviews-tbody"></tbody>
          </table>
          <div class="admin-pagination" id="reviews-pagination"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin-auth.js"></script>
  <script src="js/admin-global.js"></script>
  <script>
    const REV_PAGE = 8;
    let allReviews = [], filteredReviews = [], revPage = 1;

    function loadReviews() {
      allReviews = JSON.parse(localStorage.getItem("ec_reviews") || "[]");
      filteredReviews = [...allReviews];
    }

    function searchReviews(q) {
      const query = q.toLowerCase();
      filteredReviews = query
        ? allReviews.filter(r => r.name.toLowerCase().includes(query) || r.review.toLowerCase().includes(query))
        : [...allReviews];
      revPage = 1;
      renderReviews();
    }

    function renderReviews() {
      const tbody = document.getElementById("reviews-tbody");
      const start = (revPage - 1) * REV_PAGE;
      const paged = filteredReviews.slice(start, start + REV_PAGE);

      if (paged.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="admin-no-results">No reviews found.</td></tr>`;
      } else {
        tbody.innerHTML = paged.map(r => `
          <tr>
            <td><div class="admin-avatar">${r.initials || r.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}</div></td>
            <td style="font-weight:500;white-space:nowrap;">${r.name}</td>
            <td style="color:var(--admin-gray-600);max-width:500px;">
              ${r.review.length > 90 ? r.review.slice(0, 90) + " …" : r.review}
            </td>
            <td>
              <button class="admin-action-btn" onclick="deleteReview('${r.name}')">···</button>
            </td>
          </tr>`).join("");
      }
      renderAdminPagination("reviews-pagination", filteredReviews.length, REV_PAGE, revPage, "revGoToPage");
    }

    function revGoToPage(page) {
      const pages = Math.ceil(filteredReviews.length / REV_PAGE);
      if (page < 1 || page > pages) return;
      revPage = page;
      renderReviews();
    }

    function deleteReview(name) {
      if (!confirm(`Delete review by ${name}?`)) return;
      allReviews = allReviews.filter(r => r.name !== name);
      filteredReviews = filteredReviews.filter(r => r.name !== name);
      localStorage.setItem("ec_reviews", JSON.stringify(allReviews));
      renderReviews();
      adminToast("Review deleted.", "success");
    }

    document.addEventListener("DOMContentLoaded", () => {
      requireAdminAuth();
      seedAdminData();
      document.getElementById("sidebar-placeholder").innerHTML = renderAdminSidebar("reviews");
      document.getElementById("topbar-placeholder").innerHTML = renderAdminTopbar("Reviews");
      loadReviews();
      renderReviews();
    });
  </script>
</body>
</html>
