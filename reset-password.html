<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">LuxStore</a>
            <span>›</span>
            <span>Reset Password</span>
          </nav>
        </div>
      </div>

      <div class="auth-page">
        <div class="auth-box">
          <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Enter your new password below.</p>
          </div>

          <form class="auth-form" onsubmit="handleResetPassword(event)">
            <div class="form-group">
              <label class="form-label">New password</label>
              <input type="password" class="form-input" id="new-password" placeholder="••••••••" minlength="6" required />
            </div>
            <div class="form-group">
              <label class="form-label">Confirm password</label>
              <input type="password" class="form-input" id="confirm-password" placeholder="••••••••" minlength="6" required />
            </div>
            <button type="submit" class="btn btn-primary">Reset password</button>
          </form>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/global.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
