<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/product.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb" id="product-breadcrumb">
            <a href="index.html">LuxStore</a>
            <span>›</span>
            <span>Loading…</span>
          </nav>
        </div>
      </div>

      <div class="container">
        <div class="product-layout" id="product-layout">
          <!-- Loaded by JS -->
          <div class="skeleton" style="aspect-ratio:1;border-radius:8px;"></div>
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div class="skeleton" style="height:24px;width:60%;border-radius:4px;"></div>
            <div class="skeleton" style="height:40px;width:40%;border-radius:4px;"></div>
            <div class="skeleton" style="height:100px;border-radius:4px;"></div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="product-tabs-section" id="product-tabs-section" style="display:none;">
          <div class="product-tabs">
            <button class="product-tab-btn active" onclick="switchProductTab(this, 'details')">Details</button>
            <button class="product-tab-btn" onclick="switchProductTab(this, 'reviews')">Reviews</button>
          </div>
          <div class="product-tab-panel active" id="tab-details"></div>
          <div class="product-tab-panel" id="tab-reviews"></div>
        </div>

        <!-- Related -->
        <section class="related-section" id="related-section" style="display:none;">
          <span class="tag">Same Category Products</span>
          <h2>You might also like</h2>
          <div class="related-grid" id="related-grid"></div>
        </section>
      </div>
    </main>

    <!-- Write Review Modal -->
    <div class="modal-overlay" id="review-modal" onclick="handleModalClick(event)">
      <div class="modal-box">
        <div class="modal-header">
          <h3>Write Review</h3>
          <button class="modal-close" onclick="closeReviewModal()">✕</button>
        </div>
        <form class="modal-form" onsubmit="submitReview(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="review-email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label class="form-label">Full name</label>
            <input type="text" class="form-input" id="review-name" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label class="form-label">Review</label>
            <textarea class="form-input" id="review-text" rows="3" placeholder="Share your experience…" required style="resize:vertical;"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Rating</label>
            <div class="star-rating-input" id="star-input">
              <button type="button" data-star="1" onclick="setReviewStar(1)">★</button>
              <button type="button" data-star="2" onclick="setReviewStar(2)">★</button>
              <button type="button" data-star="3" onclick="setReviewStar(3)">★</button>
              <button type="button" data-star="4" onclick="setReviewStar(4)">★</button>
              <button type="button" data-star="5" onclick="setReviewStar(5)">★</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-full">Submit Your Review</button>
        </form>
      </div>
    </div>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/products.data.js"></script>
  <script src="js/global.js"></script>
  <script src="js/home.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
