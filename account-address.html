<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account – Address – Ecommerce</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">Ecommerce</a>
            <span>›</span>
            <span>My Account</span>
          </nav>
        </div>
      </div>

      <div class="container account-page">
        <h1 style="font-family:var(--font-serif);font-size:28px;font-weight:400;padding:24px 0 0;">My Account</h1>
        <div class="account-layout" id="account-layout"></div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/global.js"></script>
  <script src="js/account-sidebar.js"></script>
  <script src="js/account.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireAuth();
      const user = getUser();
      const addr = user?.address || {};
      const layout = document.getElementById("account-layout");
      layout.innerHTML = renderAccountSidebar("address") + `
        <div class="account-content">
          <h2>Shipping Address</h2>
          <form class="address-form" onsubmit="saveAddress(event)">
            <div class="form-group">
              <label class="form-label">Street Address</label>
              <input type="text" class="form-input" id="addr-street" placeholder="1438 Naples Avenue" value="${addr.street || ""}" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">City</label>
                <input type="text" class="form-input" id="addr-city" placeholder="Panama City" value="${addr.city || ""}" />
              </div>
              <div class="form-group">
                <label class="form-label">State</label>
                <input type="text" class="form-input" id="addr-state" placeholder="FL" value="${addr.state || ""}" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Zip Code</label>
                <input type="text" class="form-input" id="addr-zip" placeholder="32405" value="${addr.zip || ""}" />
              </div>
              <div class="form-group">
                <label class="form-label">Country</label>
                <input type="text" class="form-input" id="addr-country" placeholder="United States" value="${addr.country || ""}" />
              </div>
            </div>
            <div class="save-btn-row">
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
          </form>
        </div>`;
    });

    function saveAddress(e) {
      e.preventDefault();
      updateUserField({
        address: {
          street: document.getElementById("addr-street").value,
          city: document.getElementById("addr-city").value,
          state: document.getElementById("addr-state").value,
          zip: document.getElementById("addr-zip").value,
          country: document.getElementById("addr-country").value,
        }
      });
      showToast("Address saved!", "success");
    }
  </script>
</body>
</html>
