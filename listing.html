<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop – Ecommerce</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/listing.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">Ecommerce</a>
            <span>›</span>
            <span id="breadcrumb-label">Search</span>
          </nav>
        </div>
      </div>

      <div class="container">
        <div class="listing-layout">
          <!-- Sidebar -->
          <aside class="filter-sidebar" id="filter-sidebar">
            <!-- Categories -->
            <div class="filter-section">
              <div class="filter-title">Categories</div>
              <ul class="filter-list" id="cat-filter">
                <li class="filter-item"><label><input type="radio" name="cat" value="all" checked onchange="applyFilters()"> All</label></li>
                <li class="filter-item"><label><input type="radio" name="cat" value="tshirts" onchange="applyFilters()"> T-Shirts</label></li>
                <li class="filter-item"><label><input type="radio" name="cat" value="hoodies" onchange="applyFilters()"> Hoodies</label></li>
                <li class="filter-item"><label><input type="radio" name="cat" value="sweatshirts" onchange="applyFilters()"> Sweatshirts</label></li>
                <li class="filter-item"><label><input type="radio" name="cat" value="accessories" onchange="applyFilters()"> Accessories</label></li>
              </ul>
            </div>

            <!-- Colors -->
            <div class="filter-section">
              <div class="filter-title">Color</div>
              <div class="filter-colors" id="color-filter">
                <button class="filter-color-btn" style="background:#0a0a0a;" data-color="Black" title="Black" onclick="toggleColorFilter(this)"></button>
                <button class="filter-color-btn" style="background:#f3f4f6;border:1.5px solid var(--gray-300);" data-color="White" title="White" onclick="toggleColorFilter(this)"></button>
                <button class="filter-color-btn" style="background:#78350f;" data-color="Brown" title="Brown" onclick="toggleColorFilter(this)"></button>
                <button class="filter-color-btn" style="background:#1d4ed8;" data-color="Blue" title="Blue" onclick="toggleColorFilter(this)"></button>
                <button class="filter-color-btn" style="background:#374151;" data-color="Gray" title="Gray" onclick="toggleColorFilter(this)"></button>
              </div>
            </div>

            <!-- Sizes -->
            <div class="filter-section">
              <div class="filter-title">Size</div>
              <div class="filter-sizes" id="size-filter">
                <button class="size-btn" data-size="XS" onclick="toggleSizeFilter(this)">XS</button>
                <button class="size-btn" data-size="S" onclick="toggleSizeFilter(this)">S</button>
                <button class="size-btn" data-size="M" onclick="toggleSizeFilter(this)">M</button>
                <button class="size-btn" data-size="L" onclick="toggleSizeFilter(this)">L</button>
                <button class="size-btn" data-size="XL" onclick="toggleSizeFilter(this)">XL</button>
                <button class="size-btn" data-size="XXL" onclick="toggleSizeFilter(this)">XXL</button>
              </div>
            </div>

            <!-- Price -->
            <div class="filter-section">
              <div class="filter-title">Price</div>
              <div class="filter-price-range">
                <input type="range" class="price-slider" id="price-slider" min="0" max="10000" value="10000" oninput="updatePriceFilter(this.value)" />
                <div class="price-display">
                  <span>0DA</span>
                  <span id="price-display-val">100DA</span>
                </div>
              </div>
            </div>
          </aside>

          <!-- Main Content -->
          <div class="listing-main">
            <div class="applied-filters" id="applied-filters"></div>
            <div class="listing-header">
              <p class="listing-count" id="listing-count">Showing <strong>0</strong> results</p>
              <select class="sort-select" id="sort-select" onchange="applyFilters()">
                <option value="default">SORT BY: Default</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="rating">Top Rated</option>
                <option value="name">Name: A-Z</option>
              </select>
            </div>
            <div class="listing-grid" id="listing-grid"></div>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/products.data.js"></script>
  <script src="js/global.js"></script>
  <script src="js/home.js"></script>
  <script src="js/listing.js"></script>
</body>
</html>
