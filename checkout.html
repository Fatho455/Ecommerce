<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>
  <link rel="icon" href="assets/images/Logomark.svg" type="image/svg+xml">
  <link rel="icon" href="assets/images/Logomark.png" type="image/png">
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/cart.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">LuxStore</a>
            <span>›</span>
            <span>Checkout</span>
          </nav>
        </div>
      </div>

      <div class="container checkout-page">
        <h1 style="font-family:var(--font-serif);font-size:32px;font-weight:400;margin-bottom:32px;">Checkout</h1>
        <div class="checkout-grid">
          <!-- Shipping Form -->
          <div class="checkout-section">
            <h2>Shipping Address</h2>
            <form class="checkout-form" id="checkout-form" onsubmit="placeOrder(event)">
              <div class="form-group">
                <label class="form-label">Street Address</label>
                <input type="text" class="form-input" id="street" placeholder="1438 Naples Avenue" required />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">City</label>
                  <input type="text" class="form-input" id="city" placeholder="Panama City" required />
                </div>
                <div class="form-group">
                  <label class="form-label">State</label>
                  <input type="text" class="form-input" id="state" placeholder="FL" required />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Zip Code</label>
                  <input type="text" class="form-input" id="zip" placeholder="32405" required />
                </div>
                <div class="form-group">
                  <label class="form-label">Country</label>
                  <input type="text" class="form-input" id="country" placeholder="United States" required />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                  <label class="form-label">Full name</label>
                  <input type="text" class="form-input" id="fullname" placeholder="John Doe" required />
                </div>
              </div>
              <button type="submit" class="btn btn-primary" style="padding:14px;font-size:15px;margin-top:8px;">Place Order</button>
            </form>
          </div>

          <!-- Order Summary -->
          <div class="checkout-order-summary">
            <div class="order-summary">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--gray-200);">
                <h3 style="margin:0;border:none;padding:0;">Your Order</h3>
                <a href="cart.html" class="btn btn-outline" style="font-size:13px;padding:6px 14px;">Edit Cart</a>
              </div>
              <div class="checkout-order-imgs" id="checkout-imgs"></div>
              <div id="checkout-summary-rows"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/store/orders.store.js"></script>
  <script src="js/products.data.js"></script>
  <script src="js/global.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
