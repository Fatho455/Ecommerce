<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – Ecommerce</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">Ecommerce</a>
            <span>›</span>
            <span>Forgot Password</span>
          </nav>
        </div>
      </div>

      <div class="auth-page">
        <div class="auth-box">
          <div class="auth-header">
            <h1>Forgot Password</h1>
          </div>

          <div class="auth-info-box">
            Please enter the email address associated with your account. We'll promptly send you a link to reset your password.
          </div>

          <form class="auth-form" onsubmit="handleForgotPassword(event)">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="forgot-email" placeholder="you@example.com" required />
            </div>
            <button type="submit" class="btn btn-primary">Send reset link</button>
          </form>

          <div class="auth-footer" style="margin-top:16px;">
            <a href="login.html">← Back to Login</a>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/global.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
