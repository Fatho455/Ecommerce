<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account – Password – Ecommerce</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">Ecommerce</a>
            <span>›</span>
            <span>My Account</span>
          </nav>
        </div>
      </div>

      <div class="container account-page">
        <h1 style="font-family:var(--font-serif);font-size:28px;font-weight:400;padding:24px 0 0;">My Account</h1>
        <div class="account-layout" id="account-layout"></div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/global.js"></script>
  <script src="js/account-sidebar.js"></script>
  <script src="js/account.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireAuth();
      const layout = document.getElementById("account-layout");
      layout.innerHTML = renderAccountSidebar("password") + `
        <div class="account-content">
          <h2>Change Password</h2>
          <form class="password-form" onsubmit="changePassword(event)">
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" class="form-input" id="new-pass" placeholder="••••••••" minlength="6" required />
            </div>
            <div class="form-group">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-input" id="confirm-pass" placeholder="••••••••" minlength="6" required />
            </div>
            <div class="save-btn-row">
              <button type="submit" class="btn btn-primary">Change password</button>
            </div>
          </form>
        </div>`;
    });

    function changePassword(e) {
      e.preventDefault();
      const newPass = document.getElementById("new-pass").value;
      const confirmPass = document.getElementById("confirm-pass").value;
      if (newPass !== confirmPass) {
        showToast("Passwords do not match.", "error");
        return;
      }
      const user = getUser();
      if (user) {
        const users = JSON.parse(localStorage.getItem("ec_users") || "[]");
        const found = users.find(u => u.email === user.email);
        if (found) {
          found.password = btoa(newPass);
          localStorage.setItem("ec_users", JSON.stringify(users));
        }
      }
      showToast("Password updated successfully!", "success");
      e.target.reset();
    }
  </script>
</body>
</html>
