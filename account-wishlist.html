<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">LuxStore</a>
            <span>›</span>
            <span>My Account</span>
          </nav>
        </div>
      </div>

      <div class="container account-page">
        <h1 style="font-family:var(--font-serif);font-size:28px;font-weight:400;padding:24px 0 0;">My Account</h1>
        <div class="account-layout" id="account-layout"></div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/store/orders.store.js"></script>
  <script src="js/products.data.js"></script>
  <script src="js/global.js"></script>
  <script src="js/account-sidebar.js"></script>
  <script src="js/account.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireAuth();
      renderWishlistPage();
    });

    function renderWishlistPage() {
      const wishlist = getWishlist();
      const layout = document.getElementById("account-layout");
      layout.innerHTML = renderAccountSidebar("wishlist") + `
        <div class="account-content">
          <h2>Wishlist</h2>
          ${wishlist.length === 0 ? `
            <div class="account-empty">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><path stroke-linecap="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
              <h3>Your wishlist is empty</h3>
              <p>Save items you love for later.</p>
              <a href="listing.html" class="btn btn-primary">Browse Products</a>
            </div>` : `
            <div class="wishlist-grid">
              ${wishlist.map(item => `
                <div class="wishlist-item" id="wishlist-item-${item.id}">
                  <img src="${item.image}" alt="${item.name}"
                    onerror="this.src='https://placehold.co/64x64/f3f3f3/aaa?text=img'" />
                  <div class="wishlist-item-info">
                    <div class="wishlist-item-name">${item.name}</div>
                    <div class="wishlist-item-date">Added ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                    <div class="wishlist-item-price">Price: ${item.price?.toFixed(2) || "N/A"} DA</div>
                    <div class="wishlist-item-actions">
                      <button class="btn btn-primary" onclick="moveToCart('${item.id}')">Add to cart</button>
                      <button class="btn btn-outline" onclick="removeWishlistItem('${item.id}')">Remove</button>
                    </div>
                  </div>
                </div>`).join("")}
            </div>`}
        </div>`;
    }

    function moveToCart(id) {
      const product = getProductById(id);
      if (!product) return;
      addToCart({ id: product.id, name: product.name, price: product.price, color: product.colorNames[0] || "", size: product.sizes[1] || product.sizes[0], image: product.image });
    }

    function removeWishlistItem(id) {
      removeFromWishlist(id);
      renderWishlistPage();
    }
  </script>
</body>
</html>
