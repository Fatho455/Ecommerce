<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/account.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">LuxStore</a>
            <span>›</span>
            <span>My Account</span>
          </nav>
        </div>
      </div>

      <div class="container account-page">
        <h1 style="font-family:var(--font-serif);font-size:28px;font-weight:400;padding:24px 0 0;">My Account</h1>
        <div class="account-layout" id="account-layout"></div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/store/orders.store.js"></script>
  <script src="js/products.data.js"></script>
  <script src="js/global.js"></script>
  <script src="js/account-sidebar.js"></script>
  <script src="js/account.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireAuth();
      const orders = getOrders();
      const layout = document.getElementById("account-layout");
      layout.innerHTML = renderAccountSidebar("orders") + `
        <div class="account-content">
          <h2>Orders</h2>
          ${orders.length === 0 ? `
            <div class="account-empty">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M8 7h8M8 12h5M8 17h3"/></svg>
              <h3>No orders yet</h3>
              <p>Your order history is waiting to be filled.</p>
              <a href="listing.html" class="btn btn-primary">Start Shopping →</a>
            </div>` : `
            <table class="orders-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Order Placed</th>
                  <th>Status</th>
                  <th>Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${orders.map(o => `
                  <tr>
                    <td>
                      <div class="order-product-cell">
                        <img class="order-product-img"
                          src="${o.items[0]?.image || ""}"
                          alt="${o.items[0]?.name || "Order"}"
                          onerror="this.src='https://placehold.co/48x48/f3f3f3/aaa?text=img'" />
                        <div>
                          <div style="font-weight:500;font-size:14px;">${o.items[0]?.name || "Order"}${o.items.length > 1 ? ` +${o.items.length - 1} more` : ""}</div>
                          <div style="font-size:12px;color:var(--gray-400);">${o.id}</div>
                        </div>
                      </div>
                    </td>
                    <td style="color:var(--gray-500);">${o.date}</td>
                    <td><span class="order-status ${o.status.toLowerCase()}">${o.status}</span></td>
                    <td style="font-weight:600;">${o.total.toFixed(2)}DA</td>
                    <td><a href="#" class="order-view-btn">View Item</a></td>
                  </tr>`).join("")}
              </tbody>
            </table>`}
        </div>`;
    });
  </script>
</body>
</html>
