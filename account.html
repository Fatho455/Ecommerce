<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/account.css" />
  <style>
    /* ── Order Modal ── */
    .order-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .order-modal-overlay.open { opacity: 1; pointer-events: all; }
    .order-modal {
      background: var(--white);
      border-radius: 12px;
      width: 100%; max-width: 500px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      transform: translateY(-14px);
      transition: transform 0.25s ease;
    }
    .order-modal-overlay.open .order-modal { transform: translateY(0); }

    .order-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-200);
      position: sticky; top: 0;
      background: var(--white); z-index: 1;
      border-radius: 12px 12px 0 0;
    }
    .order-modal-head h3 { font-size: 16px; font-weight: 600; }
    .order-modal-close {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; color: var(--gray-400);
      font-size: 18px; cursor: pointer;
      transition: all 0.18s;
    }
    .order-modal-close:hover { background: var(--gray-100); color: var(--black); }

    .order-modal-body { padding: 24px; }

    .order-modal-section {
      background: var(--gray-50);
      border-radius: 8px; padding: 16px;
      margin-bottom: 16px;
    }
    .order-modal-section-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--gray-400); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .order-modal-section-title svg { width: 13px; height: 13px; }

    .order-modal-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 6px 0;
      border-bottom: 1px solid var(--gray-200);
      font-size: 13.5px;
    }
    .order-modal-row:last-child { border-bottom: none; }
    .order-modal-row span:first-child { color: var(--gray-500); }
    .order-modal-row span:last-child { font-weight: 500; }

    .order-modal-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--gray-100);
    }
    .order-modal-item:last-child { border-bottom: none; }
    .order-modal-item img {
      width: 48px; height: 48px; border-radius: 6px;
      object-fit: cover; background: var(--gray-100);
    }
    .order-modal-item-name { font-size: 13.5px; font-weight: 500; }
    .order-modal-item-meta { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
    .order-modal-item-price { font-size: 14px; font-weight: 600; margin-left: auto; }

    .order-modal-total {
      display: flex; justify-content: space-between;
      padding: 14px 16px;
      background: var(--black); color: var(--white);
      border-radius: 8px; font-size: 15px; font-weight: 700;
      margin-bottom: 20px;
    }

    .cancel-order-btn {
      width: 100%; padding: 13px;
      background: #fef2f2; color: #dc2626;
      border: 1.5px solid #fecaca;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .cancel-order-btn:hover { background: #fee2e2; border-color: #dc2626; }
    .cancel-order-btn:disabled {
      opacity: 0.5; cursor: not-allowed;
      background: var(--gray-100); color: var(--gray-400);
      border-color: var(--gray-200);
    }

    .already-cancelled-note {
      text-align: center; padding: 10px;
      background: var(--gray-50); border-radius: 8px;
      font-size: 13px; color: var(--gray-400);
    }

    /* Status pill update animation */
    @keyframes statusPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .status-popped { animation: statusPop 0.3s ease; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">LuxStore</a>
            <span>›</span>
            <span>My Account</span>
          </nav>
        </div>
      </div>

      <div class="container account-page">
        <h1 style="font-family:var(--font-serif);font-size:28px;font-weight:400;padding:24px 0 0;">My Account</h1>
        <div class="account-layout" id="account-layout"></div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <!-- ── Order Detail Modal ── -->
  <div class="order-modal-overlay" id="order-modal" onclick="handleOverlayClick(event)">
    <div class="order-modal">
      <div class="order-modal-head">
        <h3 id="modal-order-title">Order Details</h3>
        <button class="order-modal-close" onclick="closeOrderModal()">✕</button>
      </div>
      <div class="order-modal-body" id="order-modal-body"></div>
    </div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/store/orders.store.js"></script>
  <script src="js/products.data.js"></script>
  <script src="js/global.js"></script>
  <script src="js/account-sidebar.js"></script>
  <script src="js/account.js"></script>
  <script>

    // ── Render the full orders page ──
    function renderOrdersPage() {
      requireAuth();
      const user = getUser();                          // ← add this
      const orders = getOrders().filter(o =>           // ← change this
       o.email === user?.email || o.name === user?.name
       );
      const layout = document.getElementById("account-layout");
      layout.innerHTML = renderAccountSidebar("orders") + `
        <div class="account-content">
          <h2>Orders</h2>
          ${orders.length === 0 ? `
            <div class="account-empty">
              <img src="assets/images/Empy State.svg" alt="No orders" 
                style="width:64px;height:64px;object-fit:contain;margin:0 auto 16px;" />
              <h3>No orders yet</h3>
              <p>Your order history is waiting to be filled.</p>
              <a href="listing.html" class="btn btn-primary">Start Shopping →</a>
            </div>` : `
            <table class="orders-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Order Placed</th>
                  <th>Status</th>
                  <th>Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="orders-tbody">
                ${renderOrderRows(orders)}
              </tbody>
            </table>`}
        </div>`;
    }

    function renderOrderRows(orders) {
      return orders.map(o => `
        <tr id="row-${o.id}">
          <td>
            <div class="order-product-cell">
              <img class="order-product-img"
                src="${o.items[0]?.image || "assets/images/Empy State.svg"}"
                alt="${o.items[0]?.name || "Order"}"
                onerror="this.src='https://placehold.co/48x48/f3f3f3/aaa?text=img'" />
              <div>
                <div style="font-weight:500;font-size:14px;">
                  ${o.items[0]?.name || "Order"}${o.items.length > 1 ? ` +${o.items.length - 1} more` : ""}
                </div>
                <div style="font-size:12px;color:var(--gray-400);">${o.id}</div>
              </div>
            </div>
          </td>
          <td style="color:var(--gray-500);">${o.date}</td>
          <td>
            <span class="order-status ${o.status.toLowerCase()}" id="status-${o.id}">
              ${o.status}
            </span>
          </td>
          <td style="font-weight:600;">${o.total.toFixed(2)} DA</td>
          <td>
            <button onclick="openOrderModal('${o.id}')" class="order-view-btn"
              style="background:none;border:none;cursor:pointer;color:var(--gray-500);
                font-size:13px;font-weight:500;padding:0;text-decoration:underline;">
              View Item
            </button>
          </td>
        </tr>`).join("");
    }

    // ── Open modal ──
    function openOrderModal(orderId) {
      const user = getUser();                          // ← add this
      const orders = getOrders().filter(o =>           // ← change this
        o.email === user?.email || o.name === user?.name
      );
      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      document.getElementById("modal-order-title").textContent = `Order ${order.id}`;
      document.getElementById("order-modal-body").innerHTML = buildModalContent(order);
      document.getElementById("order-modal").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function buildModalContent(order) {
      const isCancelled = order.status.toLowerCase() === "cancelled";
      const isCompleted = order.status.toLowerCase() === "completed";
      const canCancel = !isCancelled && !isCompleted;

      return `
        <!-- Order Info -->
        <div class="order-modal-section">
          <div class="order-modal-section-title">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path stroke-linecap="round" d="M8 7h8M8 12h5"/>
            </svg>
            Order Information
          </div>
          <div class="order-modal-row">
            <span>Order ID</span>
            <span>${order.id}</span>
          </div>
          <div class="order-modal-row">
            <span>Date Placed</span>
            <span>${order.date}</span>
          </div>
          <div class="order-modal-row">
            <span>Status</span>
            <span class="order-status ${order.status.toLowerCase()}" id="modal-status-badge">
              ${order.status}
            </span>
          </div>
          <div class="order-modal-row">
            <span>Items</span>
            <span>${order.items?.length || 1} item(s)</span>
          </div>
        </div>

        <!-- Items -->
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;
          letter-spacing:0.08em;color:var(--gray-400);
          margin-bottom:12px;display:flex;align-items:center;gap:6px;">
          <svg fill="none" viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
          </svg>
          Items Ordered
        </div>

        <div style="margin-bottom:16px;">
          ${(order.items || []).map(item => `
            <div class="order-modal-item">
              <img src="${item.image || "https://placehold.co/48x48/f3f3f3/aaa?text=img"}"
                alt="${item.name}"
                onerror="this.src='https://placehold.co/48x48/f3f3f3/aaa?text=img'" />
              <div style="flex:1;min-width:0;">
                <div class="order-modal-item-name">${item.name}</div>
                <div class="order-modal-item-meta">
                  ${item.color ? "Color: " + item.color : ""}
                  ${item.size ? " · Size: " + item.size : ""}
                  ${item.qty ? " · Qty: " + item.qty : ""}
                </div>
              </div>
              <div class="order-modal-item-price">
                ${item.price ? (item.price * (item.qty || 1)).toFixed(2) + " DA" : "—"}
              </div>
            </div>`).join("")}
        </div>

        <!-- Total -->
        <div class="order-modal-total">
          <span>Total</span>
          <span>${order.total.toFixed(2)} DA</span>
        </div>

        <!-- Cancel Button -->
        ${canCancel ? `
          <button class="cancel-order-btn" id="cancel-btn-${order.id}"
            onclick="cancelOrder('${order.id}')">
            <svg fill="none" viewBox="0 0 24 24" width="16" height="16"
              stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path stroke-linecap="round" d="M15 9l-6 6M9 9l6 6"/>
            </svg>
            Cancel Order
          </button>` :
          isCancelled ? `
          <div class="already-cancelled-note">
            <svg fill="none" viewBox="0 0 24 24" width="16" height="16"
              stroke="currentColor" stroke-width="2"
              style="display:inline;margin-right:6px;vertical-align:middle;">
              <circle cx="12" cy="12" r="10"/>
              <path stroke-linecap="round" d="M15 9l-6 6M9 9l6 6"/>
            </svg>
            This order has already been cancelled.
          </div>` : `
          <div class="already-cancelled-note">
            ✓ This order has been completed and cannot be cancelled.
          </div>`
        }
      `;
    }

    // ── Cancel Order ──
    function cancelOrder(orderId) {
      const btn = document.getElementById(`cancel-btn-${orderId}`);
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<span style="opacity:0.6;">Cancelling…</span>`;
      }

      setTimeout(() => {
        // Update in localStorage
        const orders = JSON.parse(localStorage.getItem("ec_orders") || "[]");
        const order = orders.find(o => o.id === orderId);
        if (order) {
          order.status = "Cancelled";
          localStorage.setItem("ec_orders", JSON.stringify(orders));
        }

        // Update status badge in modal
        const modalBadge = document.getElementById("modal-status-badge");
        if (modalBadge) {
          modalBadge.className = "order-status cancelled status-popped";
          modalBadge.textContent = "Cancelled";
        }

        // Update status badge in the table row (stays on page)
        const rowBadge = document.getElementById(`status-${orderId}`);
        if (rowBadge) {
          rowBadge.className = "order-status cancelled status-popped";
          rowBadge.textContent = "Cancelled";
        }

        // Replace cancel button with note
        if (btn) {
          btn.outerHTML = `
            <div class="already-cancelled-note">
              <svg fill="none" viewBox="0 0 24 24" width="16" height="16"
                stroke="currentColor" stroke-width="2"
                style="display:inline;margin-right:6px;vertical-align:middle;">
                <circle cx="12" cy="12" r="10"/>
                <path stroke-linecap="round" d="M15 9l-6 6M9 9l6 6"/>
              </svg>
              Order has been cancelled successfully.
            </div>`;
        }

        showToast("Order cancelled successfully.", "success");
      }, 600);
    }

    // ── Close modal ──
    function closeOrderModal() {
      document.getElementById("order-modal").classList.remove("open");
      document.body.style.overflow = "";
    }

    function handleOverlayClick(e) {
      if (e.target === e.currentTarget) closeOrderModal();
    }

    // ── Init ──
    document.addEventListener("DOMContentLoaded", renderOrdersPage);
  </script>
</body>
</html>
