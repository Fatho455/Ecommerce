<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Ecommerce</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-header">
        <div class="container">
          <nav class="breadcrumb">
            <a href="index.html">Ecommerce</a>
            <span>›</span>
            <span>Sign up</span>
          </nav>
        </div>
      </div>

      <div class="auth-page">
        <div class="auth-box">
          <div class="auth-header">
            <h1>Sign up</h1>
            <p>Create your account to get started.</p>
          </div>

          <button class="auth-google-btn" onclick="loginWithGoogle()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>

          <div class="auth-divider">OR</div>

          <form class="auth-form" onsubmit="handleSignup(event)">
            <div class="form-group">
              <label class="form-label">Name</label>
              <input type="text" class="form-input" id="signup-name" placeholder="John Doe" required />
            </div>
            <div class="form-group">
              <label class="form-label">Gmail</label>
              <input type="email" class="form-input" id="signup-email" placeholder="you@gmail.com" required />
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" class="form-input" id="signup-password" placeholder="••••••••" minlength="6" required />
            </div>
            <p class="auth-terms">
              By Creating An Account You Agree With Our
              <a href="#">Terms Of Service</a>, <a href="#">Privacy Policy</a>
            </p>
            <button type="submit" class="btn btn-primary">Create account</button>
          </form>

          <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
  <script src="js/store/wishlist.store.js"></script>
  <script src="js/store/auth.store.js"></script>
  <script src="js/global.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
