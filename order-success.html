<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Successful</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />

</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>

    <main>
      <div class="page-banner success">
        <div class="container">
          <nav class="breadcrumb" style="padding:14px 0 0;">
            <a href="index.html">LuxStore</a>
            <span>›</span>
            <span>Successful Order</span>
          </nav>
          <h1 style="padding-bottom:14px;">Successful Order</h1>

      </div>

      <div class="container order-result-section">
        <div class="order-result-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8 8-4-4"/>
            <rect x="2" y="3" width="20" height="18" rx="2" stroke-linecap="round"/>

        <p>Your order has been successfully placed and is now<br>being processed.</p>
        <a href="account.html" class="btn btn-primary">
          Go to my account
          <svg fill="none" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </a>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="js/store/cart.store.js"></script>
